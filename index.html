<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota de Pedido - CON AMOR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div id="hoja-pedido" class="nota-pedido">
    <header class="header-pedido">
        <div class="logo-seccion">
            <div class="titulo-grupo">
                <h1>NOTA DE PEDIDO</h1>
                <input type="text" id="fabrica-nombre" value="CON AMOR" class="input-destacado">
            </div>
            <div class="fecha-grupo">
                <p>Fecha: <span id="fecha-actual"></span></p>
                <div class="nro-pedido-box">Pedido N°: <input type="text" id="nro-pedido" value="3"></div>
            </div>
        </div>
        <div class="datos-cliente">
            <input type="text" id="cliente" placeholder="Cliente / Razón Social" class="input-full">
            <div class="datos-fila">
                <input type="text" id="localidad" placeholder="Localidad" class="input-flex">
                <input type="text" id="transporte" placeholder="Transporte / Expreso" class="input-flex">
            </div>
        </div>
    </header>

    <div class="contenedor-tabla">
        <table>
            <thead>
                <tr>
                    <th rowspan="2" class="col-cant">Cant</th>
                    <th rowspan="2" class="col-art">Art.</th>
                    <th rowspan="2" class="col-color">Color</th>
                    <th colspan="10" class="cat-talles">MESES</th>
                    <th colspan="10" class="cat-talles">AÑOS</th>
                </tr>
                <tr class="talles-header">
                    <th>00</th><th>0</th><th>1</th><th>3</th><th>6</th><th>9</th><th>12</th><th>18</th><th>24</th><th>36</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>8</th><th>10</th><th>12</th><th>14</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                <tr class="fila-producto">
                    <td><input type="number" class="total-cant" readonly value="0"></td>
                    <td><input type="text" class="art-cod"></td>
                    <td><input type="text" class="art-color"></td>
                    <td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="no-print acciones-centradas">
        <button onclick="agregarFila()" class="btn-add">+ Artículo</button>
    </div>

    <footer>
        <textarea id="observaciones" placeholder="Observaciones..."></textarea>
        <div class="no-print acciones-finales">
            <button onclick="generarPDF()" class="btn-pdf">Descargar PDF</button>
            <button onclick="enviarWhatsapp()" class="btn-whatsapp">WhatsApp</button>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
