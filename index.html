<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota de Pedido Profesional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div id="hoja-pedido" class="nota-pedido">
    <header class="header-pedido">
        <div class="logo-seccion">
            <div class="titulo-principal">
                <h1>NOTA DE PEDIDO</h1>
                <input type="text" id="fabrica-nombre" placeholder="NOMBRE DE FÁBRICA / MARCA" class="input-destacado">
            </div>
            <div class="fecha-nro">
                <p>Fecha: <span id="fecha-actual"></span></p>
                <div class="nro-pedido-box">
                    <label>Pedido N°:</label>
                    <input type="text" id="nro-pedido" placeholder="001">
                </div>
            </div>
        </div>
        <div class="datos-cliente">
            <input type="text" id="cliente" placeholder="Nombre del Cliente / Razón Social">
            <div class="fila-input">
                <input type="text" id="localidad" placeholder="Localidad/Ciudad">
                <input type="text" id="transporte" placeholder="Transporte / Expreso">
            </div>
        </div>
    </header>

    <div class="tabla-contenedor">
        <table id="tabla-articulos">
            <thead>
                <tr>
                    <th rowspan="2">Cant</th>
                    <th rowspan="2">Art.</th>
                    <th rowspan="2">Color</th>
                    <th colspan="10" class="cat-talles">MESES</th>
                    <th colspan="10" class="cat-talles">AÑOS</th>
                    <th rowspan="2">Precio</th>
                    <th rowspan="2">Subtotal</th>
                </tr>
                <tr class="talles-header">
                    <th>00</th><th>0</th><th>1</th><th>3</th><th>6</th><th>9</th><th>12</th><th>18</th><th>24</th><th>36</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>8</th><th>10</th><th>12</th><th>14</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                <tr class="fila-producto">
                    <td><input type="number" class="total-cant" readonly value="0"></td>
                    <td><input type="text" class="art-cod"></td>
                    <td><input type="text" class="art-color"></td>
                    <td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td>
                    <td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td><td><input type="number" class="t"></td>
                    <td><input type="number" class="art-precio" placeholder="$"></td>
                    <td class="fila-subtotal">$0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pie-tabla">
        <button onclick="agregarFila()" class="btn-add no-print">+ Agregar Artículo</button>
        <div class="gran-total">TOTAL: <span id="total-final">$0</span></div>
    </div>

    <footer class="footer-pedido">
        <textarea id="observaciones" placeholder="Observaciones / Fecha de entrega..."></textarea>
        <div class="botones-envio no-print">
            <button onclick="generarPDF()" class="btn-pdf">Descargar PDF (Formato Hoja)</button>
            <button onclick="enviarWhatsapp()" class="btn-whatsapp">Enviar por WhatsApp</button>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
